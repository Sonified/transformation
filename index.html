<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Transformation</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>✨</text></svg>">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0a0a0f;--card:#151520;--card-hover:#1c1c2e;--accent:#7c5cbf;--accent-glow:#9b7dd4;--text:#e0e0e0;--text-dim:#888;--progress-bg:#2a2a3a;--watched:#4caf50}

/* Auth gate */
.auth-gate{position:fixed;inset:0;z-index:9999;background:var(--bg);display:flex;align-items:center;justify-content:center}
.auth-gate.hidden{display:none}
.auth-box{background:var(--card);border:1px solid #252535;border-radius:12px;padding:32px;max-width:360px;width:90%;text-align:center}
.auth-box h2{font-size:1.4rem;font-weight:300;letter-spacing:.1em;color:var(--accent-glow);margin-bottom:8px}
.auth-box p{color:var(--text-dim);font-size:.85rem;margin-bottom:20px}
.auth-box input{width:100%;padding:10px 12px;font-size:15px;background:var(--bg);color:var(--text);border:1px solid #333;border-radius:6px;text-align:center;letter-spacing:2px}
.auth-box input:focus{outline:none;border-color:var(--accent)}
.auth-box button{margin-top:12px;width:100%;padding:10px;font-size:15px;font-weight:600;background:var(--accent);color:#fff;border:none;border-radius:6px;cursor:pointer;transition:opacity .15s}
.auth-box button:disabled{opacity:.3;cursor:default}
.auth-box button:not(:disabled):hover{opacity:.85}
.auth-error{color:#f85149;font-size:.8rem;margin-top:8px;min-height:20px}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
header{text-align:center;padding:2.5rem 1rem 1.5rem;background:linear-gradient(180deg,#12121f 0%,var(--bg) 100%)}
header h1{font-size:2rem;font-weight:300;letter-spacing:.15em;text-transform:uppercase;color:var(--accent-glow)}
header p{color:var(--text-dim);margin-top:.4rem;font-size:.9rem;letter-spacing:.05em}
.section{max-width:1200px;margin:0 auto;padding:0 1rem 2rem}
.section h2{font-size:1.1rem;text-transform:uppercase;letter-spacing:.1em;color:var(--accent);margin:2rem 0 1rem;padding-bottom:.5rem;border-bottom:1px solid #252535}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:1rem}
.card{background:var(--card);border-radius:10px;overflow:hidden;cursor:pointer;transition:transform .2s,background .2s;position:relative}
.card:hover{background:var(--card-hover)}
.card .thumb{width:100%;aspect-ratio:16/9;background:#1a1a2a;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden}
.card .thumb img{width:100%;height:100%;object-fit:cover}
.card .thumb .placeholder{color:var(--text-dim);font-size:.8rem}
.card .info{padding:.8rem 1rem}
.card .info h3{font-size:.85rem;font-weight:500;line-height:1.3;margin-bottom:.4rem}
.card .info .meta{font-size:.85rem;color:var(--text-dim);display:flex;align-items:center;gap:.5rem}
.card .progress-bar{height:12px;background:var(--progress-bg);position:relative;transition:height .15s;cursor:pointer}
.card:hover .progress-bar{height:16px}
.card .progress-bar .fill{height:100%;background:var(--accent);transition:width .3s;pointer-events:none}
.card .progress-bar .playhead{position:absolute;top:50%;right:0;width:14px;height:14px;background:#fff;border-radius:50%;transform:translate(50%,-50%);box-shadow:0 0 4px rgba(0,0,0,.5);opacity:0;transition:opacity .15s;pointer-events:none}
.card:hover .progress-bar .playhead{opacity:1}
.card .watched-badge{position:absolute;top:8px;right:8px;background:var(--watched);color:#fff;width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;display:none;z-index:2}
.card.is-watched .watched-badge{display:flex}
.card.is-watched .thumb img{opacity:.7}

/* Cards are clickable, mode set globally */

/* Modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:1000;display:none;align-items:center;justify-content:center;padding:2rem}
.modal-overlay.active{display:flex}
.modal{width:100%;max-width:900px;background:#1a1a2a;border-radius:12px;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,.6)}
.modal .player-wrap{position:relative}
.modal .player-wrap iframe{width:100%;border:none}
@media (orientation: landscape) and (max-width: 900px) {
  .modal .modal-header{display:none}
  .modal-overlay.active{padding:0}
  .modal{border-radius:0;max-width:100%;height:100%}
  .modal .player-wrap{padding-top:0;height:100%}
}
.modal .modal-header{display:flex;justify-content:space-between;align-items:center;padding:.8rem 1rem;flex-shrink:0}
.modal .modal-header h3{font-size:.95rem;font-weight:500}
.modal .modal-header button{background:none;border:none;color:var(--text-dim);font-size:1.5rem;cursor:pointer;line-height:1}
.modal .modal-header button:hover{color:#fff}

/* Controls bar */
.controls{display:flex;align-items:center;justify-content:center;gap:2rem;flex-wrap:wrap;padding:.8rem 1rem}
.controls label{font-size:.8rem;color:var(--text-dim);display:flex;align-items:center;gap:.5rem;cursor:pointer}
.controls select{background:#1a1a2a;color:var(--text);border:1px solid #333;border-radius:6px;padding:.3rem .5rem;font-size:.8rem;cursor:pointer}
.controls select:focus{outline:1px solid var(--accent);border-color:var(--accent)}
.toggle{position:relative;width:36px;height:20px;background:#333;border-radius:10px;cursor:pointer;transition:background .2s}
.toggle.on{background:var(--accent)}
.toggle::after{content:'';position:absolute;top:2px;left:2px;width:16px;height:16px;background:#fff;border-radius:50%;transition:transform .2s}
.toggle.on::after{transform:translateX(16px)}
.sleep-active{color:var(--accent-glow);font-size:.75rem;font-weight:500}
.pill-toggle{display:flex;background:#1a1a2a;border-radius:8px;padding:2px;border:1px solid #333}
.pill{background:none;border:none;color:var(--text-dim);font-size:.8rem;padding:.3rem .7rem;border-radius:6px;cursor:pointer;transition:all .15s}
.pill.active{background:var(--accent);color:#fff}

/* Audio player mode */
.audio-player-bar{position:fixed;bottom:1rem;left:3%;right:3%;background:#151520;border:1px solid #252535;border-radius:12px;z-index:900;display:none;flex-direction:column;padding:0;box-shadow:0 8px 32px rgba(0,0,0,.5)}
.audio-player-bar.active{display:flex}
.audio-player-bar .ap-main{display:flex;align-items:center;gap:.8rem;padding:.6rem 1rem}
.audio-player-bar .ap-title{flex:1;font-size:.85rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.audio-player-bar .ap-time{font-size:.75rem;color:var(--text-dim);min-width:90px;text-align:center}
.ap-btn{background:none;border:none;color:var(--text);font-size:.85rem;cursor:pointer;padding:.4rem .5rem;border-radius:6px;transition:background .15s;font-weight:600;letter-spacing:-.02em}
.ap-btn:hover{background:rgba(255,255,255,.1)}
.ap-btn.play-pause{width:40px;height:40px;min-width:40px;min-height:40px;border-radius:50%;background:var(--accent);display:flex;align-items:center;justify-content:center;font-size:1rem;line-height:1}
.ap-btn.play-pause:hover{background:var(--accent-glow)}
.audio-player-bar .ap-main{min-height:56px}
.ap-btn.skip{color:var(--text-dim);font-size:.75rem}
.ap-progress{width:100%;height:6px;background:var(--progress-bg);cursor:pointer;position:relative;transition:height .15s;border-radius:12px 12px 0 0;overflow:visible}
.ap-progress:hover,.ap-progress.dragging{height:12px}
.ap-progress .ap-fill{height:100%;background:var(--accent);pointer-events:none;transition:width .2s;border-radius:12px 0 0 0}
.ap-progress .ap-ticks{position:absolute;bottom:100%;left:0;right:0;height:28px;pointer-events:none;opacity:0;transition:opacity .15s}
.ap-progress:hover .ap-ticks,.ap-progress.dragging .ap-ticks{opacity:1}
.ap-progress .ap-tick{position:absolute;bottom:0;width:1px;background:rgba(255,255,255,.25)}
.ap-progress .ap-tick.hour{background:rgba(255,255,255,.6);width:2px}
.ap-progress .ap-tick-label{position:absolute;bottom:100%;transform:translateX(-50%);font-size:.6rem;color:var(--text-dim);white-space:nowrap}
.ap-progress .ap-playhead{position:absolute;top:50%;width:14px;height:14px;background:#fff;border-radius:50%;transform:translate(-50%,-50%);box-shadow:0 0 4px rgba(0,0,0,.5);opacity:0;transition:opacity .15s;pointer-events:none;z-index:2}
.ap-progress:hover .ap-playhead,.ap-progress.dragging .ap-playhead{opacity:1}
.ap-progress .ap-hover-time{position:absolute;bottom:100%;transform:translateX(-50%);background:#222;color:#fff;font-size:.7rem;padding:2px 6px;border-radius:4px;pointer-events:none;opacity:0;transition:opacity .1s;margin-bottom:4px}
.ap-progress:hover .ap-hover-time,.ap-progress.dragging .ap-hover-time{opacity:1}
.ap-hidden-player{position:fixed;left:-9999px;top:-9999px;width:1px;height:1px;opacity:.01;pointer-events:none}

/* Now Playing card */
.now-playing{max-width:800px;margin:1rem auto;padding:0 1rem}
@media (min-width: 769px) { .now-playing{display:none !important} .now-playing-card,.now-playing-card.active{display:none !important} }
.now-playing-card{background:linear-gradient(135deg,#1c1c2e 0%,#151520 100%);border:1px solid #252535;border-radius:12px;padding:1.2rem;display:none;touch-action:none;-webkit-touch-callout:none}
.now-playing-card.active{display:block}
.now-playing-info{margin-bottom:.5rem}
.now-playing-label{font-size:.65rem;text-transform:uppercase;letter-spacing:.15em;color:var(--accent);margin-bottom:.5rem}
.now-playing-title{font-size:1.1rem;font-weight:500;margin-bottom:.4rem;line-height:1.3;overflow:hidden;white-space:nowrap;text-overflow:ellipsis}
.now-playing-title .scroll-inner{display:inline-block;white-space:nowrap}
.now-playing-title .scroll-inner.scrolling{animation:npScroll var(--scroll-dur,6s) 3s ease-in-out infinite}
@keyframes npScroll{0%,10%{transform:translateX(0)}40%,60%{transform:translateX(var(--scroll-dist,0))}90%,100%{transform:translateX(0)}}
.now-playing-controls{display:flex;align-items:center;justify-content:center;gap:1.5rem;margin-bottom:.4rem;margin-top:.2rem}
.now-playing-progress{display:flex;align-items:center;gap:.6rem}
.now-playing-progress .np-bar{flex:1;height:6px;background:var(--progress-bg);border-radius:3px;cursor:pointer;position:relative}
.now-playing-progress .np-bar .np-fill{height:100%;background:var(--accent);border-radius:3px;transition:width .2s}
.now-playing-progress .np-time{font-size:.7rem;color:var(--text-dim);min-width:36px}
.np-btn{background:none;border:none;color:var(--text);cursor:pointer;padding:.3rem;transition:opacity .15s;font-weight:600}
.np-btn:hover{opacity:.7}
.np-btn.np-play{width:56px;height:56px;border-radius:50%;background:var(--accent);display:flex;align-items:center;justify-content:center}
.np-btn.np-play:hover{background:var(--accent-glow)}
.np-btn.np-skip{color:var(--text-dim)}
.np-btn.np-seek{color:var(--text-dim)}

/* Playlist view */
.playlist-container{max-width:800px;margin:0 auto;padding:0 1rem}
.playlist-container .section{padding:0 0 1rem}
.playlist-container .section h2{margin:1.2rem 0 .6rem}
.playlist-item{display:flex;align-items:center;gap:.8rem;padding:.6rem .8rem;border-bottom:1px solid #1a1a2a;cursor:pointer;transition:background .15s;border-radius:6px}
.playlist-item:hover{background:var(--card-hover)}
.playlist-item.active{background:var(--card);border-left:3px solid var(--accent)}
.playlist-item .pi-num{color:var(--text-dim);font-size:.75rem;min-width:24px;text-align:center}
.playlist-item.active .pi-num{color:var(--accent)}
.playlist-item .pi-title{flex:1;font-size:.85rem}
.playlist-item.active .pi-title{color:var(--accent-glow)}
.playlist-item .pi-dur{color:var(--text-dim);font-size:.75rem}
.playlist-item .pi-progress{width:40px;height:3px;background:var(--progress-bg);border-radius:2px;overflow:hidden}
.playlist-item .pi-progress .pi-fill{height:100%;background:var(--accent)}
.playlist-item .pi-watched{color:var(--watched);font-size:.8rem}
.pi-eq{display:none;align-items:flex-end;gap:2px;height:14px}
.playlist-item.active .pi-eq{display:flex}
.pi-eq span{display:block;width:3px;background:var(--accent);border-radius:1px;height:3px;transition:height .35s ease-in-out}

/* Mobile: now-playing fixed at bottom */
@media (max-width: 768px) {
  .audio-player-bar{display:none !important}
  .now-playing{position:fixed;bottom:0;left:0;right:0;z-index:900;margin:0;padding:0}
  .now-playing-card{border-radius:16px 16px 0 0;box-shadow:0 -8px 32px rgba(0,0,0,.5);padding:.8rem 1.2rem calc(1rem + env(safe-area-inset-bottom))}
  .now-playing-card::after{content:'';display:block;position:absolute;left:0;right:0;top:100%;height:200px;background:#151520}
  .now-playing-card.active{display:block;position:relative}
  .now-playing-label{margin-bottom:0;display:inline;font-size:.6rem}
  .now-playing-title{margin-bottom:0;display:block;font-size:.95rem;text-overflow:ellipsis}
  .now-playing-info{margin-bottom:.8rem}
  .playlist-container{padding-bottom:16rem}
  .np-btn.np-play{width:64px;height:64px;min-width:64px;min-height:64px}
  .np-btn.np-play svg{width:32px;height:32px}
  .np-btn.np-seek svg{width:36px;height:36px}
  .np-btn.np-skip svg{width:30px;height:30px}
  .now-playing-controls{gap:1rem}
  .now-playing-progress .np-bar{height:8px;border-radius:4px}
  .now-playing-progress .np-bar .np-fill{border-radius:4px}
}

/* Recently played */
.recent-row{display:flex;gap:1rem;overflow-x:auto;padding-bottom:.5rem;-webkit-overflow-scrolling:touch}
.recent-row::-webkit-scrollbar{height:4px}
.recent-row::-webkit-scrollbar-thumb{background:#333;border-radius:2px}
.recent-row .card{min-width:220px;max-width:220px;flex-shrink:0}
.recent-row .card.last-played{border:1.5px solid var(--accent);box-shadow:0 0 12px rgba(124,92,191,.25)}

/* Mobile: horizontal scroll for all sections */
@media (max-width: 768px) {
  .grid{display:flex !important;grid-template-columns:none !important;gap:1rem;overflow-x:auto;padding-bottom:.5rem;-webkit-overflow-scrolling:touch}
  .grid::-webkit-scrollbar{height:4px}
  .grid::-webkit-scrollbar-thumb{background:#333;border-radius:2px}
  .grid .card{min-width:220px;max-width:220px;flex-shrink:0}
}

/* Reset progress button */
.reset-all{position:fixed;bottom:1rem;right:1rem;background:#333;color:var(--text-dim);border:none;padding:.4rem .8rem;border-radius:6px;font-size:.7rem;cursor:pointer;opacity:.4;transition:opacity .2s}
.reset-all:hover{opacity:1;color:#fff}
</style>
</head>
<body>

<!-- Auth Gate -->
<div class="auth-gate" id="authGate">
  <div class="auth-box">
    <h2>Transformation</h2>
    <p>Enter password to continue</p>
    <input type="password" id="authInput" placeholder="Password" autocomplete="off"
      oninput="document.getElementById('authBtn').disabled = !this.value.trim()" />
    <div class="auth-error" id="authError"></div>
    <button id="authBtn" onclick="tryAuth()" disabled>Enter</button>
  </div>
</div>

<header>
<h1>Transformation 🦋</h1>
<p>Dr. Joe Dispenza — Progressive Online Workshop</p>
</header>

<div class="controls">
  <label>Playback
    <div class="pill-toggle" id="view-mode">
      <button class="pill active" data-mode="thumbnails" onclick="setViewMode('thumbnails')">Video</button>
      <button class="pill" data-mode="fullscreen" onclick="setViewMode('fullscreen')">Fullscreen</button>
      <button class="pill" data-mode="audio" onclick="setViewMode('audio')">Audio</button>
    </div>
  </label>
  <label>
    Autoplay
    <div class="toggle" id="autoplay-toggle" onclick="toggleAutoplay()"></div>
  </label>
  <label>
    Sleep Timer
    <select id="sleep-timer" onchange="setSleepTimer(this.value)">
      <option value="0">Off</option>
      <option value="15">15 min</option>
      <option value="30">30 min</option>
      <option value="45">45 min</option>
      <option value="60">60 min</option>
    </select>
    <span id="sleep-status"></span>
  </label>
</div>

<div id="playlist-view" style="display:none">
  <div class="now-playing">
    <div class="now-playing-card" id="now-playing-card">
      <div id="np-player-container" style="width:100%;aspect-ratio:16/9;border-radius:8px;overflow:hidden;margin-bottom:.6rem;display:none;position:relative"></div>
      <div class="now-playing-info">
        <span class="now-playing-label">Now Playing:</span> <span class="now-playing-title" id="np-title"><span class="scroll-inner">Select a track</span></span>
      </div>
      <div class="now-playing-controls">
        <button class="np-btn np-skip" onclick="audioSkip(-1)" title="Previous"><svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/></svg></button>
        <button class="np-btn np-seek" onclick="audioSeekRel(-15)" title="Back 15s"><svg width="28" height="28" viewBox="0 0 24 24" fill="currentColor"><path d="M12 5V1L7 6l5 5V7c3.31 0 6 2.69 6 6s-2.69 6-6 6-6-2.69-6-6H4c0 4.42 3.58 8 8 8s8-3.58 8-8-3.58-8-8-8z"/><text x="12" y="15.5" text-anchor="middle" font-size="7.5" font-weight="700" font-family="sans-serif">15</text></svg></button>
        <button class="np-btn np-play" id="np-play-btn" onclick="audioTogglePlay()"><svg id="np-play-icon" width="28" height="28" viewBox="0 0 24 24" fill="currentColor"><polygon class="icon-play" points="5,3 19,12 5,21"/><g class="icon-pause" style="display:none"><rect x="5" y="3" width="5" height="18"/><rect x="14" y="3" width="5" height="18"/></g></svg></button>
        <button class="np-btn np-seek" onclick="audioSeekRel(15)" title="Forward 15s"><svg width="28" height="28" viewBox="0 0 24 24" fill="currentColor"><path d="M12 5V1l5 5-5 5V7c-3.31 0-6 2.69-6 6s2.69 6 6 6 6-2.69 6-6h2c0 4.42-3.58 8-8 8s-8-3.58-8-8 3.58-8 8-8z"/><text x="12" y="15.5" text-anchor="middle" font-size="7.5" font-weight="700" font-family="sans-serif">15</text></svg></button>
        <button class="np-btn np-skip" onclick="audioSkip(1)" title="Next"><svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/></svg></button>
      </div>
      <div class="now-playing-progress">
        <span class="np-time" id="np-time-cur">0:00</span>
        <div class="np-bar" onclick="seekAudioNP(event)" ontouchstart="seekAudioNP(event)" ontouchmove="seekAudioNPMove(event)" ontouchend="seekAudioNPEnd(event)"><div class="np-fill" id="np-fill"></div></div>
        <span class="np-time" id="np-time-dur">0:00</span>
      </div>
    </div>
  </div>
  <div class="playlist-container" id="playlist-container"></div>
</div>

<div class="audio-player-bar" id="audio-bar">
  <div class="ap-progress" id="ap-progress" onmousemove="showHoverTime(event)">
    <div class="ap-fill" id="ap-fill"></div>
    <div class="ap-playhead" id="ap-playhead"></div>
    <div class="ap-ticks" id="ap-ticks"></div>
    <div class="ap-hover-time" id="ap-hover-time">0:00</div>
  </div>
  <div class="ap-main">
    <button class="ap-btn skip" onclick="audioSkip(-1)" title="Previous">Prev</button>
    <button class="ap-btn" onclick="audioSeekRel(-15)" title="Back 15s">−15s</button>
    <button class="ap-btn play-pause" id="ap-play-btn" onclick="audioTogglePlay()">▶</button>
    <button class="ap-btn" onclick="audioSeekRel(15)" title="Forward 15s">+15s</button>
    <button class="ap-btn skip" onclick="audioSkip(1)" title="Next">Next</button>
    <div class="ap-title" id="ap-title">Select a track</div>
    <div class="ap-time" id="ap-time">0:00 / 0:00</div>
  </div>
</div>
<div class="ap-hidden-player" id="ap-hidden-player"></div>

<div id="recent-section" class="section" style="display:none">
  <h2>Recently Played</h2>
  <div class="recent-row" id="recent-row"></div>
</div>
<div id="app"></div>

<div class="modal-overlay" id="modal">
<div class="modal">
<div class="modal-header">
<h3 id="modal-title"></h3>
<button onclick="closePlayer()">&times;</button>
</div>
<div class="player-wrap">
<div id="player-container"></div>
</div>
</div>
</div>

<button class="reset-all" onclick="if(confirm('Reset all progress?')){Object.keys(localStorage).filter(k=>k.startsWith('progress_')).forEach(k=>localStorage.removeItem(k));location.reload()}">Reset Progress</button>

<script src="https://player.vimeo.com/api/player.js"></script>
<script>
// Auth gate with 4x exponential lockout
(function() {
  const PWD = 'surprise';
  const gate = document.getElementById('authGate');
  const input = document.getElementById('authInput');
  const btn = document.getElementById('authBtn');
  const errorEl = document.getElementById('authError');

  // Check if already authed
  if (localStorage.getItem('transformation_auth') === 'yes') {
    gate.classList.add('hidden');
  } else {
    // Hide content behind gate
    document.querySelector('header').style.visibility = 'hidden';
    document.getElementById('app').style.visibility = 'hidden';
    document.querySelector('.controls').style.visibility = 'hidden';
  }

  let fails = parseInt(localStorage.getItem('auth_fails') || '0');
  let lockoutTimer = null;

  // Check if currently locked out
  const lockedUntil = parseInt(localStorage.getItem('auth_locked_until') || '0');
  if (lockedUntil > Date.now()) {
    startLockout(Math.ceil((lockedUntil - Date.now()) / 1000));
  }

  input.addEventListener('keydown', e => { if (e.key === 'Enter' && !btn.disabled) tryAuth(); });

  window.tryAuth = function() {
    if (input.value.trim() === PWD) {
      localStorage.setItem('transformation_auth', 'yes');
      localStorage.removeItem('auth_fails');
      localStorage.removeItem('auth_locked_until');
      gate.classList.add('hidden');
      document.querySelector('header').style.visibility = '';
      document.getElementById('app').style.visibility = '';
      document.querySelector('.controls').style.visibility = '';
    } else {
      fails++;
      localStorage.setItem('auth_fails', fails);
      input.value = '';
      input.focus();

      if (fails === 1) {
        errorEl.textContent = 'Wrong password';
        return;
      }

      // Lockout: 5s × 4^(fails-2) → 5s, 20s, 80s, 320s...
      const lockoutSec = 5 * Math.pow(4, fails - 2);
      localStorage.setItem('auth_locked_until', Date.now() + lockoutSec * 1000);
      startLockout(lockoutSec);
    }
  };

  function startLockout(totalSec) {
    btn.disabled = true;
    input.disabled = true;
    if (lockoutTimer) clearInterval(lockoutTimer);
    let remaining = totalSec;
    function tick() {
      if (remaining <= 0) {
        clearInterval(lockoutTimer);
        lockoutTimer = null;
        btn.disabled = !input.value.trim();
        input.disabled = false;
        errorEl.textContent = '';
        input.focus();
        return;
      }
      const m = Math.floor(remaining / 60);
      const s = String(remaining % 60).padStart(2, '0');
      const fmt = m > 0 ? `${m}:${s}` : `${remaining}s`;
      btn.textContent = fmt;
      errorEl.textContent = 'Too many attempts';
      remaining--;
    }
    tick();
    lockoutTimer = setInterval(tick, 1000);
  }
})();
</script>

const app = document.getElementById('app');
let currentPlayer = null;
let saveInterval = null;
let currentVideoId = null;

// Flat list of all video IDs in order for autoplay
const ALL_IDS = VIDEOS.flatMap(s => s.items.map(v => v.id));

// Autoplay
let autoplayEnabled = JSON.parse(localStorage.getItem('autoplay') || 'false');
const autoplayToggle = document.getElementById('autoplay-toggle');
if (autoplayEnabled) autoplayToggle.classList.add('on');

function toggleAutoplay() {
  autoplayEnabled = !autoplayEnabled;
  autoplayToggle.classList.toggle('on', autoplayEnabled);
  localStorage.setItem('autoplay', JSON.stringify(autoplayEnabled));
}

function playNext(currentId) {
  const idx = ALL_IDS.indexOf(currentId);
  if (idx < 0 || idx >= ALL_IDS.length - 1) return;
  const nextId = ALL_IDS[idx + 1];
  const nextVideo = VIDEOS.flatMap(s => s.items).find(v => v.id === nextId);
  if (nextVideo) {
    closePlayer();
    setTimeout(() => openPlayer(nextId, nextVideo.title), 300);
  }
}

// Sleep timer
let sleepTimeout = null;
let sleepEndTime = null;
let sleepCountdown = null;

function setSleepTimer(minutes) {
  clearTimeout(sleepTimeout);
  clearInterval(sleepCountdown);
  const status = document.getElementById('sleep-status');
  if (!minutes || minutes === '0') {
    sleepTimeout = null;
    sleepEndTime = null;
    status.textContent = '';
    status.className = '';
    return;
  }
  const ms = parseInt(minutes) * 60 * 1000;
  sleepEndTime = Date.now() + ms;
  sleepTimeout = setTimeout(() => {
    if (currentPlayer) {
      currentPlayer.pause();
      closePlayer();
    }
    sleepEndTime = null;
    status.textContent = '';
    status.className = '';
    document.getElementById('sleep-timer').value = '0';
  }, ms);
  // Countdown display
  function updateCountdown() {
    if (!sleepEndTime) return;
    const remaining = Math.max(0, sleepEndTime - Date.now());
    const m = Math.floor(remaining / 60000);
    const s = String(Math.floor((remaining % 60000) / 1000)).padStart(2, '0');
    status.textContent = `${m}:${s}`;
    status.className = 'sleep-active';
    if (remaining <= 0) {
      clearInterval(sleepCountdown);
      status.textContent = '';
      status.className = '';
    }
  }
  updateCountdown();
  sleepCountdown = setInterval(updateCountdown, 1000);
}

// Render sections
VIDEOS.forEach(section => {
  const sec = document.createElement('div');
  sec.className = 'section';
  sec.innerHTML = `<h2>${section.section}</h2><div class="grid">${
    section.items.map(v => {
      const prog = getProgress(v.id);
      const pct = prog ? Math.round((prog.position / prog.duration) * 100) : 0;
      const watched = pct > 90;
      return `<div class="card ${watched ? 'is-watched' : ''}" data-id="${v.id}" onclick="playFromGrid('${v.id}','${v.title.replace(/'/g,"\\'")}')">
        <div class="thumb"><div class="placeholder">Loading...</div><div class="watched-badge">✓</div></div>
        <div class="progress-bar" data-id="${v.id}"><div class="fill" style="width:${pct}%"></div><div class="playhead" style="left:${pct}%"></div></div>
        <div class="info"><h3>${v.title}</h3><div class="meta"><span class="duration" data-id="${v.id}"></span>${pct > 0 && !watched ? `<span>${pct}%</span>` : ''}</div></div>
      </div>`;
    }).join('')
  }</div>`;
  app.appendChild(sec);
});

// Fetch thumbnails
function loadThumbnails() {
  const allVideos = VIDEOS.flatMap(s => s.items);
  allVideos.forEach(v => {
    const cards = document.querySelectorAll(`.card[data-id="${v.id}"]`);
    if (!cards.length) return;
    const cached = sessionStorage.getItem(`oembed_${v.id}`);
    if (cached) {
      cards.forEach(card => applyOembed(JSON.parse(cached), card.querySelector('.thumb'), v.id));
      return;
    }
    fetch(`https://vimeo.com/api/oembed.json?url=https://vimeo.com/${v.id}`)
      .then(r => r.json())
      .then(data => {
        sessionStorage.setItem(`oembed_${v.id}`, JSON.stringify(data));
        cards.forEach(card => applyOembed(data, card.querySelector('.thumb'), v.id));
      })
      .catch(() => {
        cards.forEach(card => { const p = card.querySelector('.placeholder'); if (p) p.textContent = 'No preview'; });
      });
  });
}

function applyOembed(data, thumb, id) {
  if (thumb.querySelector('img')) return; // already loaded
  const img = document.createElement('img');
  img.src = data.thumbnail_url;
  img.alt = data.title;
  img.loading = 'lazy';
  const placeholder = thumb.querySelector('.placeholder');
  if (placeholder) placeholder.remove();
  thumb.prepend(img);
  if (data.duration) {
    const m = Math.floor(data.duration / 60);
    const s = String(data.duration % 60).padStart(2, '0');
    document.querySelectorAll(`.duration[data-id="${id}"]`).forEach(dur => {
      dur.textContent = `${m}:${s}`;
    });
  }
}

function getProgress(id) {
  try { return JSON.parse(localStorage.getItem(`progress_${id}`)); } catch { return null; }
}

function playFromGrid(videoId, title) {
  const isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);
  let mode;
  if (isMobile) { mode = 'fullscreen'; }
  else if (viewMode === 'fullscreen') { mode = 'fullscreen'; }
  else if (viewMode === 'audio') { mode = 'audio'; }
  else { mode = 'player'; }
  openPlayer(videoId, title, mode);
}

function openPlayer(videoId, title, mode) {
  currentVideoId = videoId;
  addToRecentlyPlayed(videoId);
  const isMobileDevice = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);
  // Default mode: mobile=fullscreen, desktop=player
  if (!mode) mode = isMobileDevice ? 'fullscreen' : 'player';
  document.getElementById('modal-title').textContent = title;
  // Always show modal — player needs a visible container to render
  document.getElementById('modal').classList.add('active');
  document.body.style.overflow = 'hidden';

  const container = document.getElementById('player-container');
  container.innerHTML = '';
  const iframe = document.createElement('div');
  iframe.id = 'vimeo-player';
  container.appendChild(iframe);

  const prog = getProgress(videoId);
  const startTime = (prog && prog.position > 5 && (prog.position / prog.duration) < 0.95) ? prog.position : 0;

  const player = new Vimeo.Player('vimeo-player', {
    id: parseInt(videoId),
    width: 960,
    responsive: true,
    muted: false,
    autoplay: true
  });

  currentPlayer = player;

  player.ready().then(() => {
    if (startTime > 0) player.setCurrentTime(startTime);
    if (mode === 'audio') {
      document.querySelector('.modal .player-wrap').style.paddingTop = '0';
      document.querySelector('.modal .player-wrap').style.height = '60px';
    } else if (mode === 'fullscreen') {
      player.requestFullscreen().catch(() => {});
    }
  }).catch(() => {});

  // When exiting fullscreen, close modal and clean up
  player.on('fullscreenchange', function(data) {
    if (!data.fullscreen && mode === 'fullscreen') {
      Promise.all([player.getCurrentTime(), player.getDuration()]).then(([pos, dur]) => {
        localStorage.setItem(`progress_${videoId}`, JSON.stringify({
          position: pos, duration: dur, timestamp: Date.now()
        }));
        updateCardProgress(videoId, pos, dur);
      }).finally(() => {
        closePlayer();
      });
    }
  });

  function saveProgress(seconds, duration) {
    localStorage.setItem(`progress_${videoId}`, JSON.stringify({
      position: seconds,
      duration: duration,
      timestamp: Date.now()
    }));
    updateCardProgress(videoId, seconds, duration);
  }

  // Save progress every 1s
  let lastSave = 0;
  player.on('timeupdate', function(data) {
    const now = Date.now();
    if (now - lastSave < 1000) return;
    lastSave = now;
    saveProgress(data.seconds, data.duration);
  });

  player.on('pause', function() {
    Promise.all([player.getCurrentTime(), player.getDuration()]).then(([pos, dur]) => {
      saveProgress(pos, dur);
    });
  });

  player.on('ended', function() {
    player.getDuration().then(dur => saveProgress(dur, dur));
    if (autoplayEnabled) playNext(videoId);
  });
}

function updateCardProgress(videoId, position, duration) {
  const cards = document.querySelectorAll(`.card[data-id="${videoId}"]`);
  const pct = Math.round((position / duration) * 100);
  cards.forEach(card => {
    const fill = card.querySelector('.fill');
    if (fill) fill.style.width = pct + '%';
    const ph = card.querySelector('.playhead');
    if (ph) ph.style.left = pct + '%';
    if (pct > 90) card.classList.add('is-watched');
  });
}

// Progress bar drag-to-seek on desktop
(function() {
  let dragging = null; // {bar, videoId, duration}
  function pctFromEvent(bar, e) {
    const rect = bar.getBoundingClientRect();
    return Math.max(0, Math.min(1, (e.clientX - rect.left) / rect.width));
  }
  document.addEventListener('mousedown', function(e) {
    const bar = e.target.closest('.progress-bar[data-id]');
    if (!bar) return;
    e.preventDefault();
    e.stopPropagation();
    const id = bar.dataset.id;
    const prog = getProgress(id);
    if (!prog) return;
    dragging = {bar, videoId: id, duration: prog.duration};
    const pct = pctFromEvent(bar, e);
    bar.querySelector('.fill').style.width = (pct * 100) + '%';
    bar.querySelector('.playhead').style.left = (pct * 100) + '%';
    bar.querySelector('.fill').style.transition = 'none';
  });
  document.addEventListener('mousemove', function(e) {
    if (!dragging) return;
    const pct = pctFromEvent(dragging.bar, e);
    dragging.bar.querySelector('.fill').style.width = (pct * 100) + '%';
    dragging.bar.querySelector('.playhead').style.left = (pct * 100) + '%';
  });
  document.addEventListener('mouseup', function(e) {
    if (!dragging) return;
    const pct = pctFromEvent(dragging.bar, e);
    const pos = pct * dragging.duration;
    dragging.bar.querySelector('.fill').style.transition = '';
    localStorage.setItem(`progress_${dragging.videoId}`, JSON.stringify({
      position: pos, duration: dragging.duration, timestamp: Date.now()
    }));
    dragging = null;
  });
})();

function closePlayer() {
  document.getElementById('modal').classList.remove('active');
  document.body.style.overflow = '';
  const pw = document.querySelector('.modal .player-wrap');
  if (pw) { pw.style.paddingTop = ''; pw.style.height = ''; }
  if (currentPlayer) {
    currentPlayer.destroy();
    currentPlayer = null;
  }
  currentVideoId = null;
}

document.getElementById('modal').addEventListener('click', function(e) {
  if (e.target === this) closePlayer();
});
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closePlayer();
  if (e.key === 'Enter' && e.target.tagName !== 'INPUT' && e.target.tagName !== 'SELECT') {
    const recent = getRecentlyPlayed();
    if (recent.length) { e.preventDefault(); playVideo(recent[0]); }
  }
});

// Recently played
const allVideosList = VIDEOS.flatMap(s => s.items);

function getRecentlyPlayed() {
  try { return JSON.parse(localStorage.getItem('recently_played') || '[]'); } catch { return []; }
}

function addToRecentlyPlayed(videoId) {
  let recent = getRecentlyPlayed().filter(id => id !== videoId);
  recent.unshift(videoId);
  if (recent.length > 10) recent = recent.slice(0, 10);
  localStorage.setItem('recently_played', JSON.stringify(recent));
  renderRecentlyPlayed();
}

function renderRecentlyPlayed() {
  const recent = getRecentlyPlayed();
  const section = document.getElementById('recent-section');
  const row = document.getElementById('recent-row');
  if (!recent.length) { section.style.display = 'none'; return; }
  section.style.display = '';
  row.innerHTML = recent.map((id, idx) => {
    const v = allVideosList.find(x => x.id === id);
    if (!v) return '';
    const prog = getProgress(id);
    const pct = prog ? Math.round((prog.position / prog.duration) * 100) : 0;
    const watched = pct > 90;
    return `<div class="card ${watched ? 'is-watched' : ''}${idx === 0 ? ' last-played' : ''}" data-id="${v.id}" onclick="playFromGrid('${v.id}','${v.title.replace(/'/g,"\\'")}')">
      <div class="thumb"><div class="placeholder">Loading...</div><div class="watched-badge">✓</div></div>
      <div class="progress-bar" data-id="${v.id}"><div class="fill" style="width:${pct}%"></div><div class="playhead" style="left:${pct}%"></div></div>
      <div class="info"><h3>${v.title}</h3><div class="meta"><span class="duration" data-id="${v.id}"></span>${pct > 0 && !watched ? '<span>'+pct+'%</span>' : ''}</div></div>
    </div>`;
  }).join('');
}

renderRecentlyPlayed();
loadThumbnails();

// ── Audio Player Mode ──
let audioPlayer = null;
let audioVideoId = null;
let eqInterval = null;
function startEq() {
  stopEq();
  eqInterval = setInterval(() => {
    const bars = document.querySelectorAll('.playlist-item.active.playing .pi-eq span');
    bars.forEach(b => { b.style.height = (4 + Math.random() * 8) + 'px'; });
  }, 400);
}
function stopEq() {
  if (eqInterval) { clearInterval(eqInterval); eqInterval = null; }
  document.querySelectorAll('.pi-eq span').forEach(b => { b.style.height = '3px'; });
}
let viewMode = localStorage.getItem('view_mode') || 'thumbnails';
document.querySelectorAll('#view-mode .pill').forEach(p => {
  p.classList.toggle('active', p.dataset.mode === viewMode);
});

function setViewMode(mode) {
  viewMode = mode;
  localStorage.setItem('view_mode', mode);
  document.querySelectorAll('#view-mode .pill').forEach(p => {
    p.classList.toggle('active', p.dataset.mode === mode);
  });

  // Capture active playback for seamless handoff
  let handoffId = null, handoffTitle = null;
  let savePromise = Promise.resolve();

  if (audioPlayer && audioVideoId) {
    handoffId = audioVideoId;
    const v = allVideosList.find(x => x.id === audioVideoId);
    handoffTitle = v ? v.title : '';
    savePromise = Promise.all([audioPlayer.getCurrentTime(), audioPlayer.getDuration()]).then(([pos, dur]) => {
      localStorage.setItem(`progress_${handoffId}`, JSON.stringify({
        position: pos, duration: dur, timestamp: Date.now()
      }));
    }).catch(() => {});
  } else if (currentPlayer && currentVideoId) {
    handoffId = currentVideoId;
    const v = allVideosList.find(x => x.id === currentVideoId);
    handoffTitle = v ? v.title : document.getElementById('modal-title').textContent;
    savePromise = Promise.all([currentPlayer.getCurrentTime(), currentPlayer.getDuration()]).then(([pos, dur]) => {
      localStorage.setItem(`progress_${handoffId}`, JSON.stringify({
        position: pos, duration: dur, timestamp: Date.now()
      }));
    }).catch(() => {});
  }

  // Switch UI
  if (mode === 'audio') {
    if (currentPlayer) closePlayer();
    document.getElementById('app').style.display = 'none';
    document.getElementById('recent-section').style.display = 'none';
    document.getElementById('playlist-view').style.display = '';
    document.getElementById('audio-bar').classList.add('active');
    renderPlaylist();
  } else {
    document.getElementById('app').style.display = '';
    document.getElementById('playlist-view').style.display = 'none';
    document.getElementById('audio-bar').classList.remove('active');
    if (audioPlayer) { audioPlayer.destroy(); audioPlayer = null; }
    audioVideoId = null;
    renderRecentlyPlayed();
    loadThumbnails();
  }

  // Handoff: resume in new mode once position is saved
  if (handoffId && handoffTitle) {
    savePromise.then(() => {
      if (mode === 'audio') {
        audioPlay(handoffId, handoffTitle);
      } else if (mode === 'fullscreen') {
        if (currentPlayer && currentVideoId === handoffId) {
          currentPlayer.requestFullscreen().catch(() => {});
        } else {
          openPlayer(handoffId, handoffTitle, 'fullscreen');
        }
      } else {
        openPlayer(handoffId, handoffTitle, 'player');
      }
    });
  }
}

function renderPlaylist() {
  const el = document.getElementById('playlist-container');
  let html = '';
  let num = 0;
  VIDEOS.forEach(section => {
    html += `<div class="section"><h2>${section.section}</h2>`;
    section.items.forEach(v => {
      num++;
      const prog = getProgress(v.id);
      const pct = prog ? Math.round((prog.position / prog.duration) * 100) : 0;
      const watched = pct > 90;
      const active = audioVideoId === v.id ? ' active' : '';
      const cached = sessionStorage.getItem(`oembed_${v.id}`);
      const dur = cached ? JSON.parse(cached).duration : null;
      const durStr = dur ? `${Math.floor(dur/60)}:${String(dur%60).padStart(2,'0')}` : '';
      html += `<div class="playlist-item${active}" data-id="${v.id}" onclick="audioPlay('${v.id}','${v.title.replace(/'/g,"\\'")}')">
        <span class="pi-num">${num}</span>
        <span class="pi-eq"><span></span><span></span><span></span></span>
        <span class="pi-title">${v.title}</span>
        ${watched ? '<span class="pi-watched">✓</span>' : pct > 0 ? `<div class="pi-progress"><div class="pi-fill" style="width:${pct}%"></div></div>` : ''}
        <span class="pi-dur">${durStr}</span>
      </div>`;
    });
    html += '</div>';
  });
  el.innerHTML = html;
}

function setNpTitle(title) {
  const el = document.getElementById('np-title');
  const inner = el.querySelector('.scroll-inner') || el;
  inner.textContent = title;
  inner.classList.remove('scrolling');
  inner.style.removeProperty('--scroll-dist');
  inner.style.removeProperty('--scroll-dur');
  // After render, check if text overflows and start scroll
  requestAnimationFrame(() => {
    const overflow = inner.scrollWidth - el.clientWidth;
    if (overflow > 5) {
      inner.style.setProperty('--scroll-dist', -overflow + 'px');
      // Speed: ~50px/sec, min 3s, max 10s
      inner.style.setProperty('--scroll-dur', Math.min(10, Math.max(3, overflow / 50)) + 's');
      inner.classList.add('scrolling');
    }
  });
}

function audioPlay(videoId, title) {
  audioVideoId = videoId;
  addToRecentlyPlayed(videoId);
  document.getElementById('ap-title').textContent = title;
  document.getElementById('ap-play-btn').textContent = '⏸';
  // Now Playing card
  setNpTitle(title);
  document.querySelector('#np-play-icon .icon-play').style.display='none';document.querySelector('#np-play-icon .icon-pause').style.display='';
  document.getElementById('now-playing-card').classList.add('active');

  // Highlight active in playlist
  document.querySelectorAll('.playlist-item').forEach(el => {
    const isActive = el.dataset.id === videoId;
    el.classList.toggle('active', isActive);
    el.classList.toggle('playing', isActive);
  });

  // Destroy previous
  if (audioPlayer) { audioPlayer.destroy(); audioPlayer = null; }

  const isMobileAudio = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);
  const npContainer = document.getElementById('np-player-container');
  const container = isMobileAudio ? npContainer : document.getElementById('ap-hidden-player');
  // Show container BEFORE creating player so iOS sees a visible video element
  if (isMobileAudio) npContainer.style.display = 'block';
  container.innerHTML = '<div id="ap-vimeo"></div>';
  if (!isMobileAudio) npContainer.style.display = 'none';

  const prog = getProgress(videoId);
  const seekTo = (prog && prog.position > 5 && (prog.position / prog.duration) < 0.95) ? prog.position : null;

  audioPlayer = new Vimeo.Player('ap-vimeo', {
    id: parseInt(videoId),
    width: isMobileAudio ? 640 : 1,
    height: isMobileAudio ? 360 : 1,
    responsive: isMobileAudio,
    muted: false,
    autoplay: true,
    quality: '360p'
  });

  // User tapped a track — this IS the gesture. Keep play() direct.
  audioPlayer.ready().then(() => {
    audioPlayer.setVolume(1);
    audioPlayer.getDuration().then(dur => {
      buildTicks(dur);
    });
    return audioPlayer.play();
  }).then(() => {
    if (seekTo) return audioPlayer.setCurrentTime(seekTo);
  }).catch(err => {
    console.log('Audio play failed:', err);
  });

  // Progress tracking
  let lastSave = 0;
  audioPlayer.on('timeupdate', function(data) {
    // Update bars
    const pct = data.duration > 0 ? (data.seconds / data.duration) * 100 : 0;
    if (!apDragging) {
      document.getElementById('ap-fill').style.width = pct + '%';
      document.getElementById('ap-playhead').style.left = pct + '%';
    }
    document.getElementById('np-fill').style.width = pct + '%';
    const cur = fmtTime(data.seconds);
    const tot = fmtTime(data.duration);
    document.getElementById('ap-time').textContent = `${cur} / ${tot}`;
    document.getElementById('np-time-cur').textContent = cur;
    document.getElementById('np-time-dur').textContent = tot;

    // Save every 1s
    const now = Date.now();
    if (now - lastSave < 1000) return;
    lastSave = now;
    localStorage.setItem(`progress_${videoId}`, JSON.stringify({
      position: data.seconds, duration: data.duration, timestamp: Date.now()
    }));
    updateCardProgress(videoId, data.seconds, data.duration);
  });

  audioPlayer.on('pause', function() {
    document.getElementById('ap-play-btn').textContent = '▶';
    document.querySelector('#np-play-icon .icon-play').style.display='';document.querySelector('#np-play-icon .icon-pause').style.display='none';
    document.querySelectorAll('.playlist-item.playing').forEach(el => el.classList.remove('playing'));
    stopEq();
    Promise.all([audioPlayer.getCurrentTime(), audioPlayer.getDuration()]).then(([pos, dur]) => {
      localStorage.setItem(`progress_${videoId}`, JSON.stringify({
        position: pos, duration: dur, timestamp: Date.now()
      }));
    });
  });

  audioPlayer.on('play', function() {
    document.getElementById('ap-play-btn').textContent = '⏸';
    document.querySelector('#np-play-icon .icon-play').style.display='none';document.querySelector('#np-play-icon .icon-pause').style.display='';
    const activeItem = document.querySelector('.playlist-item.active');
    if (activeItem) activeItem.classList.add('playing');
    startEq();
  });

  audioPlayer.on('ended', function() {
    audioPlayer.getDuration().then(dur => {
      localStorage.setItem(`progress_${videoId}`, JSON.stringify({
        position: dur, duration: dur, timestamp: Date.now()
      }));
      updateCardProgress(videoId, dur, dur);
      renderPlaylist();
    });
    if (autoplayEnabled) audioSkip(1);
  });
}

function audioTogglePlay() {
  if (!audioPlayer) {
    // No player yet — start the last played or first track
    const recent = getRecentlyPlayed();
    const id = recent.length ? recent[0] : ALL_IDS[0];
    const v = allVideosList.find(x => x.id === id);
    if (v) audioPlay(v.id, v.title);
    return;
  }
  // On mobile, unmute from this user gesture (iOS requires gesture to unmute)
  audioPlayer.setVolume(1).catch(() => {});
  audioPlayer.getPaused().then(paused => {
    if (paused) audioPlayer.play();
    else audioPlayer.pause();
  });
}

function audioSeekRel(sec) {
  if (!audioPlayer) return;
  audioPlayer.setVolume(1).catch(() => {});
  Promise.all([audioPlayer.getCurrentTime(), audioPlayer.getDuration()]).then(([pos, dur]) => {
    const t = Math.max(0, Math.min(dur, pos + sec));
    audioPlayer.setCurrentTime(t).then(() => {
      // iOS requires play() after seek to actually move playback position
      audioPlayer.play().catch(() => {});
    }).catch(() => {});
  });
}

function audioSkip(dir) {
  if (!audioVideoId) { if (dir > 0) audioPlay(ALL_IDS[0], allVideosList[0].title); return; }
  const idx = ALL_IDS.indexOf(audioVideoId);
  const newIdx = idx + dir;
  if (newIdx < 0 || newIdx >= ALL_IDS.length) return;
  const v = allVideosList[newIdx];
  audioPlay(v.id, v.title);
}

let npDragPct = 0;
let npDragBar = null;

function npBarPct(e, bar) {
  const rect = bar.getBoundingClientRect();
  const clientX = e.touches ? e.touches[0].clientX : (e.changedTouches ? e.changedTouches[0].clientX : e.clientX);
  return Math.max(0, Math.min(1, (clientX - rect.left) / rect.width));
}

function seekAudioNP(e) {
  if (!audioPlayer) return;
  e.preventDefault();
  audioPlayer.setVolume(1).catch(() => {});
  npDragBar = e.currentTarget;
  npDragPct = npBarPct(e, npDragBar);
  document.getElementById('np-fill').style.width = (npDragPct * 100) + '%';
  // For click (non-drag), seek immediately
  audioPlayer.getDuration().then(dur => {
    audioPlayer.setCurrentTime(dur * npDragPct).then(() => {
      audioPlayer.play().catch(() => {});
    }).catch(() => {});
  });
}

function seekAudioNPMove(e) {
  if (!audioPlayer || !npDragBar) return;
  e.preventDefault();
  npDragPct = npBarPct(e, npDragBar);
  document.getElementById('np-fill').style.width = (npDragPct * 100) + '%';
}

function seekAudioNPEnd(e) {
  if (!audioPlayer || !npDragBar) return;
  const p = e.changedTouches ? npBarPct(e, npDragBar) : npDragPct;
  npDragBar = null;
  document.getElementById('np-fill').style.width = (p * 100) + '%';
  audioPlayer.getDuration().then(dur => {
    audioPlayer.setCurrentTime(dur * p).then(() => {
      audioPlayer.play().catch(() => {});
    }).catch(() => {});
  });
}

let currentAudioDuration = 0;
let apDragging = false;

// Desktop audio bar: drag-to-seek with playhead, seek on release
(function() {
  const bar = document.getElementById('ap-progress');
  const fill = document.getElementById('ap-fill');
  const playhead = document.getElementById('ap-playhead');

  function pct(e) {
    const rect = bar.getBoundingClientRect();
    return Math.max(0, Math.min(1, (e.clientX - rect.left) / rect.width));
  }

  function visualUpdate(p) {
    fill.style.width = (p * 100) + '%';
    playhead.style.left = (p * 100) + '%';
  }

  function ensurePlayerAndSeek(p) {
    if (audioPlayer) {
      // Player exists — get duration and seek
      audioPlayer.getDuration().then(dur => {
        audioPlayer.setCurrentTime(dur * p).then(() => {
          audioPlayer.play().catch(() => {});
        }).catch(() => {});
      });
    } else if (audioVideoId && currentAudioDuration) {
      // Player not started yet but we have a track loaded in the UI — start it
      const v = allVideosList.find(x => x.id === audioVideoId);
      if (v) {
        // Save the desired position so audioPlay picks it up
        localStorage.setItem(`progress_${audioVideoId}`, JSON.stringify({
          position: currentAudioDuration * p, duration: currentAudioDuration, timestamp: Date.now()
        }));
        audioPlay(v.id, v.title);
      }
    } else {
      // Nothing loaded — start last played or first track, then seek
      const recent = getRecentlyPlayed();
      const id = recent.length ? recent[0] : ALL_IDS[0];
      const v = allVideosList.find(x => x.id === id);
      if (v) audioPlay(v.id, v.title);
    }
  }

  bar.addEventListener('mousedown', function(e) {
    e.preventDefault();
    apDragging = true;
    bar.classList.add('dragging');
    fill.style.transition = 'none';
    visualUpdate(pct(e));
  });

  document.addEventListener('mousemove', function(e) {
    if (!apDragging) return;
    visualUpdate(pct(e));
  });

  document.addEventListener('mouseup', function(e) {
    if (!apDragging) return;
    apDragging = false;
    bar.classList.remove('dragging');
    fill.style.transition = '';
    const p = pct(e);
    visualUpdate(p);
    ensurePlayerAndSeek(p);
  });
})();

function showHoverTime(e) {
  if (!currentAudioDuration) return;
  const bar = document.getElementById('ap-progress');
  const rect = bar.getBoundingClientRect();
  const pct = Math.max(0, Math.min(1, (e.clientX - rect.left) / rect.width));
  const time = currentAudioDuration * pct;
  const el = document.getElementById('ap-hover-time');
  el.textContent = fmtTime(time);
  el.style.left = (pct * 100) + '%';
}

function buildTicks(duration) {
  currentAudioDuration = duration;
  const container = document.getElementById('ap-ticks');
  container.innerHTML = '';
  if (!duration || duration < 60) return;
  // 10-minute ticks
  const tenMin = 600;
  const hourSec = 3600;
  for (let t = tenMin; t < duration; t += tenMin) {
    const pct = (t / duration) * 100;
    const isHour = t % hourSec === 0;
    const tick = document.createElement('div');
    tick.className = 'ap-tick' + (isHour ? ' hour' : '');
    tick.style.left = pct + '%';
    tick.style.height = isHour ? '16px' : '8px';
    container.appendChild(tick);
    // Label every 10 min
    const label = document.createElement('div');
    label.className = 'ap-tick-label';
    label.style.left = pct + '%';
    const hrs = Math.floor(t / 3600);
    const mins = Math.floor((t % 3600) / 60);
    label.textContent = isHour ? `${hrs}h` : (hrs > 0 ? `${hrs}h${mins}m` : `${mins}m`);
    container.appendChild(label);
  }
}

function fmtTime(s) {
  const m = Math.floor(s / 60);
  const sec = String(Math.floor(s % 60)).padStart(2, '0');
  return `${m}:${sec}`;
}

// Keyboard shortcuts for audio player
document.addEventListener('keydown', function(e) {
  if (viewMode !== 'audio') return;
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'SELECT') return;
  if (e.code === 'Space') {
    e.preventDefault();
    if (audioPlayer) audioTogglePlay();
  } else if (e.code === 'ArrowLeft') {
    e.preventDefault();
    audioSeekRel(-15);
  } else if (e.code === 'ArrowRight') {
    e.preventDefault();
    audioSeekRel(15);
  }
});

// Init view mode
if (viewMode === 'audio') {
  setViewMode('audio');
  // Resume last played track
  const recent = getRecentlyPlayed();
  if (recent.length) {
    const lastId = recent[0];
    const v = allVideosList.find(x => x.id === lastId);
    if (v) {
      // Set up the UI without autoplaying
      audioVideoId = lastId;
      document.getElementById('ap-title').textContent = v.title;
      document.querySelectorAll('.playlist-item').forEach(el => {
        el.classList.toggle('active', el.dataset.id === lastId);
      });
      setNpTitle(v.title);
      document.getElementById('now-playing-card').classList.add('active');
      const prog = getProgress(lastId);
      if (prog) {
        const pct = (prog.position / prog.duration) * 100;
        document.getElementById('ap-fill').style.width = pct + '%';
        document.getElementById('ap-playhead').style.left = pct + '%';
        document.getElementById('np-fill').style.width = pct + '%';
        document.getElementById('ap-time').textContent = `${fmtTime(prog.position)} / ${fmtTime(prog.duration)}`;
        document.getElementById('np-time-cur').textContent = fmtTime(prog.position);
        document.getElementById('np-time-dur').textContent = fmtTime(prog.duration);
        buildTicks(prog.duration);
      }
    }
  }
}

// Restore scroll position (vertical)
const savedScroll = localStorage.getItem('scroll_y');
if (savedScroll) window.scrollTo(0, parseInt(savedScroll));
let scrollTimer;
window.addEventListener('scroll', () => {
  clearTimeout(scrollTimer);
  scrollTimer = setTimeout(() => localStorage.setItem('scroll_y', window.scrollY), 200);
}, {passive: true});

// Horizontal scroll persistence for grids + recent row
document.querySelectorAll('.grid, .recent-row').forEach((row, i) => {
  const key = 'hscroll_' + i;
  const saved = localStorage.getItem(key);
  if (saved) row.scrollLeft = parseInt(saved);
  let ht;
  row.addEventListener('scroll', () => {
    clearTimeout(ht);
    ht = setTimeout(() => localStorage.setItem(key, row.scrollLeft), 200);
  }, {passive: true});
});
</script>
</body>
